<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>말씀 빈칸 암송</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2320382f'/%3E%3Cpath d='M18 14h24a8 8 0 0 1 8 8v28H24a6 6 0 0 0-6 6V14Z' fill='%23f7f1df'/%3E%3Cpath d='M25 25h16M25 33h16M25 41h10' stroke='%23456f5b' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="control-panel" aria-label="성경 선택 및 학습 설정">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <path d="M8 10c0-2.2 1.8-4 4-4h24c2.2 0 4 1.8 4 4v28c0 2.2-1.8 4-4 4H12c-2.2 0-4-1.8-4-4V10Z" fill="#20382f" />
                <path d="M15 13h16c2.8 0 5 2.2 5 5v17H18c-1.7 0-3 1.3-3 3V13Z" fill="#f7f1df" />
                <path d="M18 18h13M18 24h13M18 30h9" stroke="#456f5b" stroke-width="2.4" stroke-linecap="round" />
                <path d="M14 37c.4-1.8 1.8-3 4-3h18" stroke="#c48b45" stroke-width="2.4" stroke-linecap="round" />
              </svg>
            </div>
            <div>
              <p>말씀 학습 도구</p>
              <h1>빈칸 암송</h1>
            </div>
          </div>

          <section class="saved-box" aria-label="저장된 장 목록">
            <div class="section-title">
              <h2>저장된 장</h2>
              <button id="refreshSavedBtn" type="button">새로고침</button>
            </div>
            <div id="savedChapterList" class="saved-list"></div>
          </section>

          <div class="field-grid">
            <label>
              번역본
              <select id="versionSelect">
                <option value="krv">개역개정</option>
                <option value="custom">직접 입력</option>
              </select>
            </label>
            <label>
              성경
              <select id="bookSelect"></select>
            </label>
            <label>
              장
              <select id="chapterSelect"></select>
            </label>
          </div>

          <div class="button-row">
            <button id="shuffleBtn" type="button">구절 섞기</button>
            <button id="randomBlankBtn" class="primary" type="button">랜덤 빈칸</button>
          </div>

          <div class="settings">
            <div class="setting-line">
              <span>빈칸 퍼센트</span>
              <output id="difficultyValue">35%</output>
            </div>
            <input id="difficultyRange" type="range" min="0" max="100" step="5" value="35" />

            <label>
              빈칸 방식
              <select id="blankModeSelect">
                <option value="nouns">명사 빈칸</option>
              </select>
            </label>

            <label class="check">
              <input id="hideRefsCheck" type="checkbox" />
              절 번호 가리기
            </label>
            <label class="check">
              <input id="firstLetterCheck" type="checkbox" checked />
              첫 글자 힌트 보이기
            </label>
            <label class="check">
              <input id="lengthHintCheck" type="checkbox" checked />
              별표로 글자 수 보이기
            </label>
          </div>
        </aside>

        <section class="study-area">
          <header class="topbar">
            <div>
              <p id="sourceLabel">본문 대기 중</p>
              <h2 id="chapterTitle">저장된 장을 고르거나 새 장을 불러오세요</h2>
            </div>
            <div class="mode-tabs" role="tablist" aria-label="학습 모드">
              <button class="active" data-mode="read" type="button">읽기</button>
              <button data-mode="quiz" type="button">빈칸</button>
            </div>
          </header>

          <section class="memory-strip" aria-label="암송 진행률">
            <div>
              <span id="progressCount">0 / 0</span>
              <strong>현재 장 구절</strong>
            </div>
            <div class="progress-track">
              <div id="progressBar"></div>
            </div>
          </section>

          <section id="messageBox" class="message-box">
            <h3>시작 방법</h3>
            <p>한 번 불러온 장은 서버에 저장됩니다. 이후 접속한 사용자도 왼쪽의 저장된 장 목록에서 바로 열 수 있습니다.</p>
          </section>

          <section id="verseList" class="verse-list" aria-live="polite"></section>
        </section>
      </section>
    </main>

    <script src="./bible-provider.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
